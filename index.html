<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Minisséries</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .search-container { width: 100%; position: sticky; top: 0; z-index: 100; background-color: var(--bg); padding: 10px 0; display: relative; }
        .search-box { width: 100%; padding: 12px 40px; border-radius: 25px; border: none; background-color: var(--card-bg); color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; margin-top: 20px; }
        .card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background-color: #334155; }
        .card-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .btn-buy { background-color: var(--primary); color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        #no-results { display: none; margin-top: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" class="search-box" id="searchInput" placeholder="Procurar minissérie...">
    </div>
    <div class="grid" id="seriesGrid"></div>
    <div id="no-results">Nenhuma minissérie encontrada...</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const PRODUTOS = [
            { id: "serie_1", nome: "De Repente Casados", img: "https://via.placeholder.com/200x300?text=Casados" },
            { id: "serie_2", nome: "O Chefe da Máfia Implora", img: "https://via.placeholder.com/200x300?text=Mafia" },
            { id: "serie_3", nome: "O Garoto de Programa em Paris", img: "https://via.placeholder.com/200x300?text=Paris" },
            { id: "serie_4", nome: "Beijando o Irmão Errado", img: "https://via.placeholder.com/200x300?text=Beijo" },
            { id: "serie_5", nome: "Meio Irmão: Segredo Sujo", img: "https://via.placeholder.com/200x300?text=Segredo" },
            { id: "serie_6", nome: "Abraço do Rei Mafioso", img: "https://via.placeholder.com/200x300?text=Rei" },
            { id: "serie_7", nome: "A Esposa do Sr Monteiro", img: "https://via.placeholder.com/200x300?text=Monteiro" },
            { id: "serie_8", nome: "Só Mais Uma Vez", img: "https://via.placeholder.com/200x300?text=Brasil" }
        ];
        const grid = document.getElementById('seriesGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('no-results');
        function renderSeries(filter = "") {
            grid.innerHTML = "";
            const filtered = PRODUTOS.filter(p => p.nome.toLowerCase().includes(filter.toLowerCase()));
            if (filtered.length === 0) { noResults.style.display = "block"; } else {
                noResults.style.display = "none";
                filtered.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${p.img}"><div class="card-info"><div class="card-title">${p.nome}</div><button class="btn-buy" onclick="comprar('${p.id}')">R$ 4,99</button></div>`;
                    grid.appendChild(card);
                });
            }
        }
        function comprar(id) { tg.sendData(JSON.stringify({ action: "buy", prod_id: id })); }
        searchInput.addEventListener('input', (e) => renderSeries(e.target.value));
        renderSeries();
    </script>
</body>
</html>
